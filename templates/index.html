<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Social Media Analytics System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',system-ui;
}

body{
display:flex;
background:#f0f2f5;
min-height:100vh;
}

.sidebar{
width:260px;
background:linear-gradient(180deg,#0f0c29,#24243e);
color:white;
padding:30px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:12px;
cursor:pointer;
border-radius:8px;
}

.sidebar ul li:hover{
background:#6c63ff;
}

.main{
flex:1;
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
font-size:22px;
}

.section{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px 20px;
background:#6c63ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4f47d4;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>SM Analytics</h2>

<ul>
<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('addUser')">Add User</li>
<li onclick="showSection('addPost')">Add Post</li>
<li onclick="showSection('addEngagement')">Add Engagement</li>
</ul>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardSection">

<h2>Dashboard Overview</h2>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p>{{ user_count }}</p>
</div>

<div class="card">
<h3>Total Posts</h3>
<p>{{ post_count }}</p>
</div>

<div class="card">
<h3>Total Engagement</h3>
<p>{{ engagement }}</p>
</div>

</div>

<div class="section">
<h3>Analytics Chart</h3>
<canvas id="analyticsChart"></canvas>
</div>

</div>

<!-- ADD USER -->

<div class="section" id="addUserSection" style="display:none;">

<h3>Add New User</h3>

<form action="/add_user" method="POST">

<input type="number" name="user_id" placeholder="User ID" required>

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="country" placeholder="Country" required>

<input type="date" name="join_date" required>

<button type="submit">Save User</button>

</form>

</div>

<!-- ADD POST -->

<div class="section" id="addPostSection" style="display:none;">

<h3>Create Post</h3>

<form action="/add_post" method="POST">

<input type="number" name="user_id" placeholder="User ID" required>

<textarea name="content" placeholder="Post Content"></textarea>

<input type="text" name="hashtags" placeholder="#tag1,#tag2">

<button type="submit">Save Post</button>

</form>

</div>

<!-- ADD ENGAGEMENT -->

<div class="section" id="addEngagementSection" style="display:none;">

<h3>Add Engagement</h3>

<form action="/add_engagement" method="POST">

<input type="number" name="post_id" placeholder="Post ID" required>

<input type="number" name="likes" placeholder="Likes">

<input type="number" name="comments" placeholder="Comments">

<input type="number" name="shares" placeholder="Shares">

<button type="submit">Save Engagement</button>

</form>

</div>

</div>

<script>

function showSection(section){

document.getElementById("dashboardSection").style.display="none";
document.getElementById("addUserSection").style.display="none";
document.getElementById("addPostSection").style.display="none";
document.getElementById("addEngagementSection").style.display="none";

if(section==="dashboard")
document.getElementById("dashboardSection").style.display="block";

if(section==="addUser")
document.getElementById("addUserSection").style.display="block";

if(section==="addPost")
document.getElementById("addPostSection").style.display="block";

if(section==="addEngagement")
document.getElementById("addEngagementSection").style.display="block";

}

/* Chart */

const ctx=document.getElementById('analyticsChart');

new Chart(ctx,{
type:'bar',
data:{
labels:["Users","Posts","Engagement"],
datasets:[{
label:'System Analytics',
data:[
{{ user_count }},
{{ post_count }},
{{ engagement }}
]
}]
}
});

</script>

</body>
</html>
